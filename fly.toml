app = "nidria-api"
primary_region = "cdg"

[build]

[env]
  ENVIRONMENT = "production"

[http_service]
  internal_port = 8000
  force_https = true
  # CRITICAL: scheduler must run 24/7 in the same process as the API.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

# HTTP healthcheck — fly polls /health every 10s. /health hits the DB
# (SELECT 1), so a frozen pool / dead Supabase connection surfaces as
# 503 → fly marks the machine unhealthy and recycles it (default
# `on-failure` restart policy). `grace_period` covers boot + alembic
# migrations on cold start; `timeout = "5s"` gives the DB query slack
# when Supabase is just slow rather than dead.
[[http_service.checks]]
  interval = "10s"
  grace_period = "30s"
  method = "GET"
  path = "/health"
  protocol = "http"
  timeout = "5s"

[[vm]]
  size = "shared-cpu-2x"
  memory = 1024
