# fly.toml app configuration file generated for nidria-api on 2026-06-12T14:34:08+05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nidria-api'
primary_region = 'cdg'

[build]

[env]
  ENVIRONMENT = 'production'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '10s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'
    protocol = 'http'

[[vm]]
  size = 'shared-cpu-2x'
  memory = '1gb'
  cpus = 2
  memory_mb = 1024
