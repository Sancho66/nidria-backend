name: CI & Deploy

on:
  push:
    branches: [main, dev, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  # Cancel only PR runs when superseded. Pushes to main / releases /
  # manual dispatches run to completion — cancelling a mid-flight
  # deploy could leave fly in a half-rolled state.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      # Scope matches `make lint` so shared/ + tests/ + scripts/
      # + alembic/env.py also get caught here.
      - run: uv run ruff check src/ shared/ tests/ scripts/ alembic/env.py
      - run: uv run ruff format --check src/ shared/ tests/ scripts/ alembic/env.py

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      # Shared models are critical paths — type errors there surface
      # as runtime exceptions (no safety net).
      - run: uv run mypy src/ shared/

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # No GHA `services.postgres` — tests/conftest.py spins up its own
    # postgres:16-alpine via testcontainers (per CLAUDE.md rule #5).
    # Adding a service postgres on top is wasted boot time + RAM,
    # since the testcontainer is what the test sessions actually
    # connect to.
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      # `-n auto` runs pytest in parallel across all available CPU
      # cores (2 on GH free runners, more on self-hosted). Each
      # xdist worker is a separate process → its own
      # PostgresContainer via conftest, so test isolation is the
      # same as serial mode. Cuts the test job from ~10min to ~5min
      # on GH's 2-core runners; larger gain locally.
      - run: uv run pytest tests/ -x -q -n auto

  openapi:
    name: OpenAPI up-to-date
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      # Contract-first (CLAUDE.md rule #12): the committed openapi.json IS the
      # front's source of truth for its schema.d.ts. A stale export is a DEAD
      # contract that passes every other check — the front codes against it
      # without knowing. Regenerate and fail on ANY drift, exactly like the
      # front's check:i18n: silent drift is only visible at CI.
      # Building the app instantiates Settings (5 required fields). The export
      # only reads route/schema definitions — never a DB or a real secret — so
      # placeholders suffice and keep the output deterministic (same as the
      # committed contract). Mirrors tests/conftest.py.
      - name: Regenerate openapi.json
        env:
          DATABASE_URL: postgresql+asyncpg://placeholder/placeholder
          DATABASE_URL_SYNC: postgresql+psycopg2://placeholder/placeholder
          JWT_AGENT_SECRET: ci-openapi-agent
          JWT_EXPAT_SECRET: ci-openapi-expat
          JWT_REFRESH_SECRET: ci-openapi-refresh
        run: uv run python scripts/export_openapi.py
      - name: openapi.json must be up to date
        run: |
          if ! git diff --quiet -- openapi.json; then
            echo "::error::openapi.json est perime, regenere-le et commite-le (make openapi)."
            git --no-pager diff -- openapi.json
            exit 1
          fi
          echo "openapi.json a jour."

  deploy:
    name: Deploy to Fly.io
    needs: [lint, typecheck, test, openapi]
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only -a nidria-api

      - name: Healthcheck
        run: |
          sleep 30
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.nidria.com/health)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Healthcheck passed"
              exit 0
            fi
            echo "⏳ Attempt $i — status $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "❌ Healthcheck failed"
          exit 1
